seed: 42
target: "llvm"
out_dir: "runs/nightly"
db_path: "runs/nightly/asfuzz_bugs.sqlite"
budget:
  iterations: 5000
  trials_smoke: 0
  trials_full: 0
  compile_timeout_sec: 180
  run_timeout_sec: 30
  max_workers: 0
  cpu_utilization: 0.8
backends: ["numpy", "tvm", "metaschedule", "halide"]
fuzzer:
  mode: "grammar"
  max_work_items: 48000000
  complexity: "stress"
  diversity_candidates: 256
  min_complexity_score: 0.28
  complexity_weight: 0.75
  novelty_weight: 1.0
  op_weights:
    matmul: 3.0
    elementwise: 1.2
    unary: 1.0
    reduce: 2.5
    softmax: 2.5
    conv2d: 3.0
    shape: 2.2
    batch_matmul: 2.8
    pool2d: 2.4
    layer_norm: 2.6
    composite: 3.2
  dtypes: ["float32", "float16"]
mrs:
  - seed_invariance
  - budget_monotonic
  - axis_permute
  - pad_slice
  - batch_split
  - layout
  - matmul_transpose
  - axis_move
  - input_scale
  - reduce_split
  - shape_identity
  - algebraic
  - decomposition
oracle:
  cross_backend: true
  rtol:
    float32: 0.001
    float16: 0.05
  atol:
    float32: 0.0001
    float16: 0.005
